program: main.py
method: bayes
metric:
  name: best_val_f1
  goal: maximize
parameters:
  lr:
    distribution: log_uniform_values
    min: 1.0e-7
    max: 1.0e-4
  weight_decay:
    values: [0.0, 0.01, 0.1]
  epochs:
    values: [3, 5, 8]
  WARMUP_STEPS:
    values: [0.05, 0.1, 0.2]
  GRADIENT_ACCUMULATION_STEPS:
    values: [1, 2, 4]
  mlp_hidden:
    values: [128, 256, 512]
  hidden_dropout_prob:
    values: [0.1, 0.2, 0.3]
  max_norm:
    values: [1.0, 5.0]
command:
  - ${env}
  - python
  - ${program}
  - --device=cuda:0
  - --ckp_name=sweep
